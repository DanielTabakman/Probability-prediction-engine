# Asset venue → data source map (reference for agents + discovery/probe scripts)
# SSOT for routing: config/assets.yaml (per asset). This file documents probes + fallbacks.
# SOP: docs/SOP/ASSET_DATA_SOURCE_DISCOVERY_V1.md

version: 1

# Multi-venue scan order when operator asks for a new asset (discover_asset_data_source.py)
discovery:
  crypto_scan_order: [deribit, bybit]
  equity_scan_order: [equity]
  min_options_to_enable: 1

venues:
  deribit:
    label: Deribit public API
    fetch_module: src.data.fetch_deribit
    api_base: https://www.deribit.com/api/v2
    registry_fields:
      - deribit_currency
    enable_requires: live_option_instruments_gt_0
    notes: >
      Crypto options implied lab. No API key for public endpoints.
      Index via get_index_price; chain via get_instruments (kind=option).

  bybit:
    label: Bybit v5 public API
    fetch_module: src.data.fetch_bybit_options
    api_base: https://api.bybit.com/v5
    registry_fields:
      - bybit_base_coin
    enable_requires: live_option_instruments_gt_0
    notes: >
      USDT-settled crypto options fallback when Deribit delists (e.g. SOL).
      Requires fetch_bybit_options adapter — discovery reports build_adapter if missing.

  equity:
    label: Yahoo Finance (yfinance)
    fetch_module: src.data.fetch_equity_options
    registry_fields:
      - equity_symbol
      - data_source
    default_data_source: yfinance
    enable_requires: yfinance_option_expiries_gt_0
    notes: >
      US equity + ETF options. Normalized to Deribit-shaped marks for the engine.
      Commodity proxies (GLD, SLV, USO) use this venue with asset_class commodity_proxy.

# Historical / research notes (discovery scans live vendors first — do not trust stale rows)
research_alternatives:
  SOL:
    note: Deribit delisted 2026-06-27; discovery auto-scans Bybit
  BNB:
    note: Deribit 0 instruments 2026-06-27; try Bybit scan
  XRP:
    note: Deribit 0 instruments 2026-06-27; try Bybit scan
