# Tradeable asset registry (v2) — SSOT for PPE fetch + catalog metadata
# Consumed by PPE core/viz; MSOS reads catalog.json / display payload only.
# Tier-1 staging rows: config/assets_tier1_manifest.yaml (merged per relay chapter).

version: 2
default_asset_id: ETH

assets:
  BTC:
    label: "BTC options"
    asset_class: crypto
    tier: core
    venue: deribit
    deribit_currency: BTC
    price_unit: USD
    spread_width: 5000
    catalog:
      group: crypto
    trust_notes: []

  ETH:
    label: "ETH options"
    asset_class: crypto
    tier: core
    venue: deribit
    deribit_currency: ETH
    price_unit: USD
    spread_width: 500
    catalog:
      group: crypto
    trust_notes:
      - "Thinner books than BTC — BL curve may be noisier; surface trust state in lab."

  NVDA:
    label: "NVDA options"
    asset_class: equity_mega
    tier: core
    venue: equity
    equity_symbol: NVDA
    price_unit: USD
    contract_multiplier: 100
    data_source: yfinance
    enabled: true
    spread_width: 25
    catalog:
      group: equity_mega
    trust_notes:
      - "Dividends and corporate actions not modeled in v1."
      - "LEAPS chain may be thin — BL trust state surfaced when OI/volume low."

  SPY:
    label: "SPY options"
    asset_class: equity_index
    tier: core
    venue: equity
    equity_symbol: SPY
    price_unit: USD
    contract_multiplier: 100
    data_source: yfinance
    enabled: true
    spread_width: 15
    catalog:
      group: equity_index
    trust_notes:
      - "Index ETF options; dividends on underlying not modeled in v1."

  QQQ:
    label: "QQQ options"
    asset_class: equity_index
    tier: core
    venue: equity
    equity_symbol: QQQ
    price_unit: USD
    contract_multiplier: 100
    data_source: yfinance
    enabled: true
    spread_width: 15
    catalog:
      group: equity_index
    trust_notes:
      - "Index ETF options; dividends on underlying not modeled in v1."

  IWM:
    label: "IWM options"
    asset_class: equity_index
    tier: extended
    venue: equity
    equity_symbol: IWM
    price_unit: USD
    contract_multiplier: 100
    data_source: yfinance
    enabled: true
    spread_width: 10
    catalog:
      group: equity_index
    trust_notes:
      - "Russell 2000 ETF; can be thinner than SPY/QQQ."

  SOL:
    label: "SOL options"
    asset_class: crypto
    tier: extended
    venue: bybit
    bybit_base_coin: SOL
    price_unit: USD
    spread_width: 50
