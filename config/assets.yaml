  HYPE:
    label: "HYPE perp"
    asset_class: crypto
    tier: experimental
    venue: hyperliquid
    hyperliquid_coin: HYPE
    price_unit: USD
    enabled: true
    exposure_only: true
    catalog:
      group: crypto
    trust_notes:
      - "Exposure-only Hyperliquid perp rail; no options chain or execution support."

  BNB:
    label: "BNB options"
    asset_class: crypto
    tier: experimental
    venue: deribit
    deribit_currency: BNB
    price_unit: USD
    spread_width: 25
