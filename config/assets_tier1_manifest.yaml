# Tier-1 tradeable universe — charter staging manifest
# Merged into config/assets.yaml per relay chapter (enabled: false until witness).
# Program: docs/SOP/PPE_TRADEABLE_UNIVERSE_PROGRAM_V1.md

program_id: ppe_tradeable_universe_program_v1
version: 1
notes: >
  BTC and ETH already live in config/assets.yaml. NVDA ships via ppe_equity_options_v1.
  Remaining rows land disabled; flip enabled after witness_asset_catalog.py passes.

catalog:
  group_order:
    - id: crypto
      label: Crypto
    - id: equity_index
      label: Indices
    - id: equity_mega
      label: Mega caps
    - id: commodity_proxy
      label: Commodities (ETF options)

# chapter_id → asset ids introduced by that relay chapter
chapters:
  ppe_crypto_multi_asset_v1:
    assets: [BTC, ETH]
    status: complete
  ppe_equity_options_v1:
    assets: [NVDA]
    status: complete
  ppe_deribit_crypto_tier1_v1:
    assets: [SOL, BNB, XRP]
  ppe_equity_universe_tier1a_v1:
    assets: [SPY, QQQ, IWM]
  ppe_equity_universe_tier1b_v1:
    assets: [AAPL, MSFT, AMZN, GOOGL, META]
  ppe_equity_universe_tier1c_v1:
    assets: [TSLA, AMD, COIN]
  ppe_commodity_proxy_tier1_v1:
    assets: [GLD, SLV, USO]

asset_templates:
