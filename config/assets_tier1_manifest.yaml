    label: "SOL options"
    asset_class: crypto
    catalog_group: crypto
    venue: deribit
    deribit_currency: SOL
    tier: extended
    spread_width: 50
    trust_notes:
      - "Thinner books than BTC/ETH — surface trust state when OI low."
