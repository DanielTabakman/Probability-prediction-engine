<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Demo session" />
    <meta name="theme-color" content="#05090f" />
    <title>Operator session notebook</title>
    <style>
      :root {
        --bg: #05090f;
        --panel: #0e1c2d;
        --panel2: #0a1522;
        --line: #1e3145;
        --text: #edf5ff;
        --muted: #8ea4bd;
        --teal: #43e7d3;
        --amber: #f2b657;
        --red: #ff6478;
        --btn: #1a3a52;
      }
      * {
        box-sizing: border-box;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.45;
        min-height: 100vh;
        padding: 10px 12px 24px;
        padding-bottom: max(24px, env(safe-area-inset-bottom));
      }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 10px;
      }
      h1 {
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0;
      }
      .sub {
        color: var(--muted);
        font-size: 0.75rem;
        margin-top: 2px;
      }
      .icon-btn {
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--amber);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 0.72rem;
        font-weight: 700;
        cursor: pointer;
      }
      .progress {
        font-size: 0.72rem;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .progress-bar {
        height: 4px;
        background: var(--line);
        border-radius: 2px;
        margin-bottom: 12px;
      }
      .progress-bar > div {
        height: 100%;
        background: var(--teal);
        border-radius: 2px;
        transition: width 0.2s ease;
      }
      .phase {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--teal);
        font-weight: 700;
        margin-bottom: 4px;
      }
      .step-title {
        font-size: 1.35rem;
        font-weight: 700;
        line-height: 1.2;
        margin: 0 0 12px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 10px;
      }
      .card h3 {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin: 0 0 6px;
        font-weight: 700;
      }
      .card p,
      .card li {
        font-size: 0.92rem;
        margin: 0;
      }
      .card ul {
        margin: 0;
        padding-left: 1.15rem;
      }
      .card ul li {
        margin-bottom: 6px;
      }
      .say {
        font-size: 1.05rem;
        font-weight: 600;
        line-height: 1.35;
        color: var(--text);
      }
      .ask {
        font-size: 1.12rem;
        font-weight: 700;
        color: var(--amber);
        line-height: 1.35;
      }
      .skip {
        font-size: 0.82rem;
        color: var(--muted);
      }
      textarea {
        width: 100%;
        min-height: 72px;
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        padding: 10px;
        font-size: 0.9rem;
        font-family: inherit;
        resize: vertical;
      }
      select,
      input[type="text"] {
        width: 100%;
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        padding: 10px;
        font-size: 0.9rem;
        font-family: inherit;
      }
      .field-label {
        display: block;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        font-weight: 700;
        margin-bottom: 6px;
      }
      .field-block {
        margin-bottom: 12px;
      }
      .yn-row,
      .likert-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .pill-btn {
        flex: 1;
        min-width: 64px;
        border: 1px solid var(--line);
        background: var(--panel2);
        color: var(--text);
        border-radius: 8px;
        padding: 10px 8px;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
      }
      .pill-btn.active {
        background: var(--teal);
        color: #041018;
        border-color: var(--teal);
      }
      .status-ok {
        color: var(--teal);
        font-size: 0.85rem;
        margin-top: 8px;
      }
      .status-warn {
        color: var(--amber);
        font-size: 0.85rem;
        margin-top: 8px;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }
      .actions button {
        flex: 1;
        border: none;
        border-radius: 10px;
        padding: 14px 12px;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
      }
      .btn-next {
        background: var(--teal);
        color: #041018;
      }
      .btn-back {
        background: var(--btn);
        color: var(--text);
        flex: 0.4;
      }
      .btn-reset {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.8rem;
        padding: 10px;
        margin-top: 10px;
        width: 100%;
        border-radius: 8px;
        cursor: pointer;
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(5, 9, 15, 0.92);
        padding: 20px 16px;
        z-index: 50;
        overflow-y: auto;
      }
      .overlay.hidden {
        display: none;
      }
      .overlay h2 {
        color: var(--amber);
        font-size: 1rem;
        margin: 0 0 12px;
      }
      .overlay .card {
        border-color: var(--amber);
      }
      .never {
        color: var(--red);
        font-size: 0.88rem;
      }
      .done-screen h2 {
        font-size: 1.2rem;
        margin: 0 0 8px;
      }
      .log-box {
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        font-size: 0.8rem;
        white-space: pre-wrap;
        margin-bottom: 10px;
      }
      .hidden {
        display: none !important;
      }
      #load-err {
        color: var(--red);
        font-size: 0.85rem;
      }
      a {
        color: var(--teal);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <p id="load-err" class="hidden">Could not load session steps. Check connection or open session.json.</p>
    </div>

    <div id="panic-overlay" class="overlay hidden" aria-hidden="true">
      <h2 id="panic-title">Panic reset</h2>
      <div class="card" id="panic-lines"></div>
      <div class="card">
        <h3>If they ask math</h3>
        <p class="say" id="panic-math"></p>
      </div>
      <div class="card">
        <h3>Never say</h3>
        <ul class="never" id="panic-never"></ul>
      </div>
      <button type="button" class="btn-next" style="width:100%;margin-top:12px" id="panic-close">
        Back to step
      </button>
    </div>

    <script>
      const STORAGE_KEY = "ppe_operator_session_v1";

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return {
              index: 0,
              notes: {},
              startedAt: null,
              survey: null,
              surveySubmitted: false,
              surveySaveStatus: null,
            };
          }
          const p = JSON.parse(raw);
          return {
            index: Number(p.index) || 0,
            notes: p.notes || {},
            startedAt: p.startedAt || null,
            survey: p.survey || null,
            surveySubmitted: Boolean(p.surveySubmitted),
            surveySaveStatus: p.surveySaveStatus || null,
          };
        } catch {
          return {
            index: 0,
            notes: {},
            startedAt: null,
            survey: null,
            surveySubmitted: false,
            surveySaveStatus: null,
          };
        }
      }

      function saveState(state) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      let notebook = null;
      let state = loadState();

      async function loadNotebook() {
        const res = await fetch("session.json?" + Date.now());
        if (!res.ok) throw new Error("fetch failed");
        notebook = await res.json();
      }

      function mdLite(text) {
        if (!text) return "";
        return text
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/\n/g, "<br>");
      }

      function ynFromNote(text) {
        if (!text) return "";
        const t = String(text).trim().toUpperCase();
        if (t.startsWith("Y")) return "Y";
        if (t.startsWith("N")) return "N";
        return "";
      }

      function defaultSurvey() {
        return {
          testerProfile: state.notes.prep || "",
          comprehension: ynFromNote(state.notes.comprehension),
          thesisConfirm: "",
          returnIntent: ynFromNote(state.notes.return),
          paidInterest: "",
          confusionCategory:
            notebook?.survey?.confusionCategories?.[7] ||
            "value/desirability signal",
          usefulness: 3,
          repeatUseIntent: 3,
          objections: "",
          sessionNotes: state.notes.log || "",
        };
      }

      function ensureSurvey() {
        if (!state.survey) {
          state.survey = defaultSurvey();
          saveState(state);
        }
      }

      function buildLogSnippet() {
        const today = new Date().toISOString().slice(0, 10);
        const s = state.survey || defaultSurvey();
        const comp = s.comprehension || "Y/N";
        const thesis = s.thesisConfirm || "Y/N";
        const ret = s.returnIntent || "Y/N";
        const paid = s.paidInterest || "N";
        const profile = s.testerProfile || "vol trader";
        const line = s.sessionNotes || s.objections || "";
        return `| ${today} | ${profile} | ${comp} | ${thesis} | ${ret} | ${paid} | ${line} |`;
      }

      function renderDone() {
        const app = document.getElementById("app");
        const log = buildLogSnippet();
        const saveMsg =
          state.surveySaveStatus === "remote"
            ? '<p class="status-ok">Feedback saved to MSOS web store.</p>'
            : state.surveySaveStatus === "local"
              ? '<p class="status-warn">Saved on phone only — server save failed. Copy the row below.</p>'
              : "";
        app.innerHTML = `
          <div class="done-screen">
            <h2>Session complete</h2>
            ${saveMsg}
            <p class="sub">Copy this row into VALIDATION_REALITY_CHECKS.md § MSOS P8</p>
            <div class="log-box" id="log-snippet">${log}</div>
            <button type="button" class="btn-next" style="width:100%" id="copy-log">Copy log row</button>
            <button type="button" class="btn-reset" id="restart">Start new session</button>
            <p class="sub" style="margin-top:14px">Demo: <a href="${notebook.demoUrl}">${notebook.demoUrl}</a></p>
          </div>`;
        document.getElementById("copy-log").onclick = () => {
          navigator.clipboard.writeText(log).catch(() => {});
          document.getElementById("copy-log").textContent = "Copied!";
        };
        document.getElementById("restart").onclick = () => {
          state = {
            index: 0,
            notes: {},
            startedAt: null,
            survey: null,
            surveySubmitted: false,
            surveySaveStatus: null,
          };
          saveState(state);
          render();
        };
      }

      function renderSurvey() {
        ensureSurvey();
        const s = state.survey;
        const survey = notebook.survey || {};
        const categories = survey.confusionCategories || [];
        const app = document.getElementById("app");

        const catOptions = categories
          .map(
            (c) =>
              `<option value="${c.replace(/"/g, "&quot;")}" ${
                s.confusionCategory === c ? "selected" : ""
              }>${c}</option>`
          )
          .join("");

        function ynButtons(field, label) {
          return `
            <div class="field-block">
              <span class="field-label">${label}</span>
              <div class="yn-row" data-yn-field="${field}">
                <button type="button" class="pill-btn ${s[field] === "Y" ? "active" : ""}" data-val="Y">Y</button>
                <button type="button" class="pill-btn ${s[field] === "N" ? "active" : ""}" data-val="N">N</button>
              </div>
            </div>`;
        }

        function likertButtons(field, label) {
          const buttons = [1, 2, 3, 4, 5]
            .map(
              (n) =>
                `<button type="button" class="pill-btn ${s[field] === n ? "active" : ""}" data-likert-field="${field}" data-val="${n}">${n}</button>`
            )
            .join("");
          return `
            <div class="field-block">
              <span class="field-label">${label}</span>
              <div class="likert-row">${buttons}</div>
              <p class="sub">1 = low · 5 = high</p>
            </div>`;
        }

        app.innerHTML = `
          <div class="top">
            <div>
              <h1>${survey.title || "Session feedback"}</h1>
              <div class="sub">${survey.subtitle || ""}</div>
            </div>
            <button type="button" class="icon-btn" id="panic-btn">Panic</button>
          </div>
          <div class="progress">After session · validation survey</div>
          <div class="field-block">
            <label class="field-label" for="sf-profile">Tester profile</label>
            <input type="text" id="sf-profile" value="${(s.testerProfile || "").replace(/"/g, "&quot;")}" placeholder="e.g. BTC vol trader, Deribit" />
          </div>
          ${ynButtons("comprehension", "Comprehension (~5 min)")}
          ${ynButtons("thesisConfirm", "Thesis / market read honest")}
          ${ynButtons("returnIntent", "Would open before next trade")}
          ${ynButtons("paidInterest", "Paid interest (steward call)")}
          <div class="field-block">
            <label class="field-label" for="sf-category">Main confusion or signal</label>
            <select id="sf-category">${catOptions}</select>
          </div>
          ${likertButtons("usefulness", "Usefulness for understanding the read")}
          ${likertButtons("repeatUseIntent", "Would use again")}
          <div class="field-block">
            <label class="field-label" for="sf-objections">Objections / confusion detail</label>
            <textarea id="sf-objections" placeholder="What felt wrong, missing, or hard to trust?">${(s.objections || "").replace(/</g, "&lt;")}</textarea>
          </div>
          <div class="field-block">
            <label class="field-label" for="sf-notes">Session notes (reality-check row)</label>
            <textarea id="sf-notes" placeholder="One-line surprise or confusion">${(s.sessionNotes || "").replace(/</g, "&lt;")}</textarea>
          </div>
          <button type="button" class="btn-next" style="width:100%" id="submit-survey">Submit feedback</button>
          <button type="button" class="btn-reset" id="back-to-steps">Back to last step</button>
        `;

        document.getElementById("sf-profile").oninput = (e) => {
          s.testerProfile = e.target.value;
          saveState(state);
        };
        document.getElementById("sf-category").onchange = (e) => {
          s.confusionCategory = e.target.value;
          saveState(state);
        };
        document.getElementById("sf-objections").oninput = (e) => {
          s.objections = e.target.value;
          saveState(state);
        };
        document.getElementById("sf-notes").oninput = (e) => {
          s.sessionNotes = e.target.value;
          saveState(state);
        };

        document.querySelectorAll("[data-yn-field]").forEach((row) => {
          const field = row.getAttribute("data-yn-field");
          row.querySelectorAll(".pill-btn").forEach((btn) => {
            btn.onclick = () => {
              s[field] = btn.getAttribute("data-val");
              saveState(state);
              renderSurvey();
            };
          });
        });

        document.querySelectorAll("[data-likert-field]").forEach((btn) => {
          btn.onclick = () => {
            const field = btn.getAttribute("data-likert-field");
            s[field] = Number(btn.getAttribute("data-val"));
            saveState(state);
            renderSurvey();
          };
        });

        document.getElementById("submit-survey").onclick = async () => {
          const btn = document.getElementById("submit-survey");
          btn.disabled = true;
          btn.textContent = "Saving…";
          if (!s.comprehension || !s.returnIntent) {
            btn.textContent = "Set comprehension + return (Y/N)";
            btn.disabled = false;
            return;
          }
          const row = buildLogSnippet();
          const payload = {
            source: "operator_session_notebook",
            tester_profile: s.testerProfile,
            comprehension: s.comprehension,
            thesis_confirm: s.thesisConfirm || undefined,
            return_intent: s.returnIntent,
            paid_interest: s.paidInterest || undefined,
            confusion_category: s.confusionCategory,
            usefulness: s.usefulness,
            repeat_use_intent: s.repeatUseIntent,
            objections_text: s.objections,
            session_note: s.sessionNotes,
            reality_check_row: row,
            session_started_at: state.startedAt,
          };
          let savedRemote = false;
          try {
            const res = await fetch("/api/feedback", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            savedRemote = res.ok;
          } catch {
            savedRemote = false;
          }
          state.surveySubmitted = true;
          state.surveySaveStatus = savedRemote ? "remote" : "local";
          saveState(state);
          render();
        };

        document.getElementById("back-to-steps").onclick = () => {
          state.index = notebook.steps.length - 1;
          saveState(state);
          render();
        };
        document.getElementById("panic-btn").onclick = showPanic;
      }

      function render() {
        if (!notebook) return;
        const steps = notebook.steps;
        const total = steps.length;
        if (state.surveySubmitted) {
          renderDone();
          return;
        }
        if (state.index >= total) {
          renderSurvey();
          return;
        }
        if (!state.startedAt) {
          state.startedAt = new Date().toISOString();
          saveState(state);
        }

        const step = steps[state.index];
        const pct = Math.round(((state.index + 1) / total) * 100);
        const app = document.getElementById("app");

        let doHtml = "";
        if (step.do && step.do.length) {
          doHtml = `<div class="card"><h3>Do this</h3><ul>${step.do
            .map((d) => `<li>${mdLite(d)}</li>`)
            .join("")}</ul></div>`;
        }
        let sayHtml = "";
        if (step.say) {
          sayHtml = `<div class="card"><h3>Say</h3><p class="say">${mdLite(
            step.say
          )}</p></div>`;
        }
        let askHtml = "";
        if (step.ask) {
          askHtml = `<div class="card"><h3>Ask them</h3><p class="ask">${mdLite(
            step.ask
          )}</p></div>`;
        }
        let skipHtml = "";
        if (step.skip) {
          skipHtml = `<p class="skip">Skip unless needed: ${mdLite(
            step.skip
          )}</p>`;
        }

        const noteKey = step.id;
        const noteVal = state.notes[noteKey] || "";

        app.innerHTML = `
          <div class="top">
            <div>
              <h1>${notebook.title}</h1>
              <div class="sub">${notebook.northStar}</div>
            </div>
            <button type="button" class="icon-btn" id="panic-btn">Panic</button>
          </div>
          <div class="progress">Step ${state.index + 1} of ${total} · ${step.phase}</div>
          <div class="progress-bar"><div style="width:${pct}%"></div></div>
          <div class="phase">${step.phase}</div>
          <h2 class="step-title">${step.title}</h2>
          <div class="card">
            <h3>What this is</h3>
            <p>${mdLite(step.context)}</p>
          </div>
          <div class="card">
            <h3>What you're trying to do</h3>
            <p>${mdLite(step.goal)}</p>
          </div>
          ${doHtml}
          ${sayHtml}
          ${askHtml}
          ${skipHtml}
          <div class="card">
            <h3>Your notes (saved on phone)</h3>
            <textarea id="step-note" placeholder="Profile, Y/N, one-line reaction…">${noteVal}</textarea>
          </div>
          <div class="actions">
            <button type="button" class="btn-back" id="back-btn" ${state.index === 0 ? "disabled" : ""}>Back</button>
            <button type="button" class="btn-next" id="next-btn">Done → next</button>
          </div>
          <button type="button" class="btn-reset" id="reset-btn">Reset session</button>
        `;

        const noteEl = document.getElementById("step-note");
        noteEl.addEventListener("input", () => {
          state.notes[noteKey] = noteEl.value;
          saveState(state);
        });

        document.getElementById("next-btn").onclick = () => {
          state.notes[noteKey] = noteEl.value;
          state.index += 1;
          saveState(state);
          render();
        };
        document.getElementById("back-btn").onclick = () => {
          if (state.index > 0) {
            state.notes[noteKey] = noteEl.value;
            state.index -= 1;
            saveState(state);
            render();
          }
        };
        document.getElementById("reset-btn").onclick = () => {
          if (confirm("Clear progress and notes on this phone?")) {
            state = {
              index: 0,
              notes: {},
              startedAt: null,
              survey: null,
              surveySubmitted: false,
              surveySaveStatus: null,
            };
            saveState(state);
            render();
          }
        };
        document.getElementById("panic-btn").onclick = showPanic;
      }

      function showPanic() {
        const p = notebook.panic;
        document.getElementById("panic-title").textContent = p.title;
        document.getElementById("panic-lines").innerHTML =
          "<ul>" +
          p.lines.map((l) => `<li>${l}</li>`).join("") +
          "</ul>";
        document.getElementById("panic-math").textContent = p.mathDeflect;
        document.getElementById("panic-never").innerHTML = notebook.neverSay
          .map((n) => `<li>${n}</li>`)
          .join("");
        const ov = document.getElementById("panic-overlay");
        ov.classList.remove("hidden");
        ov.setAttribute("aria-hidden", "false");
      }

      document.getElementById("panic-close").onclick = () => {
        const ov = document.getElementById("panic-overlay");
        ov.classList.add("hidden");
        ov.setAttribute("aria-hidden", "true");
      };

      loadNotebook()
        .then(() => {
          document.getElementById("load-err").classList.add("hidden");
          render();
        })
        .catch(() => {
          document.getElementById("load-err").classList.remove("hidden");
        });
    </script>
  </body>
</html>
