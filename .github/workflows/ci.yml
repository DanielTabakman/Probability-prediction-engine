# Required status checks for branch protection and PR auto-merge (see docs/SOP/GITHUB_ZERO_TOUCH_MERGE.md).
name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Ruff (syntax / undefined names)
        run: python -m ruff check src tests scripts

      - name: Run tests
        run: python -m pytest -q

  docker_entrypoint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t ppe-ci:test .

      - name: Verify app entry imports (production-like sys.path in container)
        run: |
          docker run --rm ppe-ci:test python -c "
          import importlib.util
          import sys
          from pathlib import Path

          root = Path('/app')
          viz = root / 'src' / 'viz'
          app = viz / 'app.py'

          sys.path = [str(viz)] + [
              p for p in sys.path
              if p and Path(p).resolve() != root.resolve()
          ]

          spec = importlib.util.spec_from_file_location('ppe_docker_entry', app)
          if spec is None or spec.loader is None:
              raise RuntimeError('cannot load app entry spec')

          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)

          if Path(mod.ROOT).resolve() != root.resolve():
              raise AssertionError(f'ROOT={mod.ROOT!r} != {root!r}')
          "

      - name: Streamlit entry starts without import error
        run: |
          set -o pipefail
          docker run --rm ppe-ci:test sh -ec '
            streamlit run src/viz/app.py \
              --server.headless true \
              --server.port 8501 \
              --server.address 127.0.0.1 \
              2>&1 | tee /tmp/streamlit.log &
            sp=$!
            for _ in $(seq 1 45); do
              if grep -q ModuleNotFoundError /tmp/streamlit.log 2>/dev/null; then
                echo "ModuleNotFoundError during Streamlit startup:"
                cat /tmp/streamlit.log
                kill $sp 2>/dev/null || true
                exit 1
              fi
              if python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8501/_stcore/health\", timeout=2)" 2>/dev/null; then
                kill $sp 2>/dev/null || true
                exit 0
              fi
              sleep 2
            done
            echo "Streamlit did not become healthy in time:"
            cat /tmp/streamlit.log
            kill $sp 2>/dev/null || true
            exit 1
          '

  ui_smoke_compact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: MVP1 compact implied-lab UI smoke
        run: python scripts/run_mvp1_compact_ui_smoke_ci.py
