# Required status checks for branch protection and PR auto-merge (see docs/SOP/GITHUB_ZERO_TOUCH_MERGE.md).
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      mirror_only: ${{ steps.filter.outputs.mirror_only }}
      sop_discovery: ${{ steps.filter.outputs.sop_discovery }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            mirror_only:
              - 'docs/SOP/VM_OPERATOR_PHASE.json'
            sop_discovery:
              - 'docs/SOP/**'
              - 'scripts/sop_discovery_core.py'
              - 'scripts/resolve_sop.py'
              - 'scripts/validate_sop_links.py'
              - 'scripts/generate_chapter_doc_index.py'
              - 'generate_chapter_doc_index.cmd'
              - 'tests/test_resolve_sop.py'
              - 'tests/test_validate_sop_links.py'
              - 'tests/test_sop_topic_coverage.py'
              - 'tests/test_ppe_queue_starter_regen.py'
              - 'tests/test_closeout_doc_validation.py'

  mirror_publish_check:
    needs: changes
    if: needs.changes.outputs.mirror_only == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate VM phase mirror JSON
        run: |
          python -c "
          import json
          from pathlib import Path
          p = Path('docs/SOP/VM_OPERATOR_PHASE.json')
          data = json.loads(p.read_text(encoding='utf-8'))
          assert isinstance(data, dict), 'mirror must be object'
          assert str(data.get('phase') or '').strip(), 'phase required'
          print('VM_OPERATOR_PHASE.json OK:', data.get('phase'))
          "

      - name: Mirror publish unit tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          python -m pytest -q tests/test_ppe_operator_followup_v2.py::test_maybe_commit_publish_vm_mirror tests/test_ppe_operator_followup_v2.py::test_mirror_is_populated --tb=short
        env:
          PYTHONPATH: .

  sop_discovery_gate:
    needs: changes
    if: needs.changes.outputs.sop_discovery == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Chapter doc index freshness
        run: python scripts/generate_chapter_doc_index.py --check
        env:
          PYTHONPATH: .

      - name: Validate SOP discovery links
        run: python scripts/validate_sop_links.py
        env:
          PYTHONPATH: .

      - name: SOP discovery unit tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          python -m pytest -q \
            tests/test_resolve_sop.py \
            tests/test_validate_sop_links.py \
            tests/test_sop_topic_coverage.py \
            tests/test_ppe_queue_starter_regen.py \
            tests/test_closeout_doc_validation.py \
            tests/test_ppe_ide_build_starter_doc_resolve.py \
            --tb=short
        env:
          PYTHONPATH: .

  pytest:
    needs: changes
    if: needs.changes.outputs.mirror_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-xdist ruff

      - name: Ruff (syntax / undefined names)
        run: python -m ruff check src tests scripts

      - name: Token economy audit (repo overhead)
        run: python scripts/ppe_token_audit.py --repo-root . --no-history --fail-on-watch
        env:
          PYTHONPATH: .

      - name: Run tests (parallel, excluding slow)
        run: python -m pytest -q -n auto -m "not slow"

      - name: Run slow tests (serial)
        run: python -m pytest -q -m slow

  msos_web_build:
    needs: changes
    if: needs.changes.outputs.mirror_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/msos-web/package-lock.json

      - name: MSOS Next.js production build (Edge middleware + compile)
        run: python scripts/verify_msos_web_build.py

  docker_entrypoint:
    needs: changes
    if: needs.changes.outputs.mirror_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7

      - name: Build production image
        run: docker build -t ppe-ci:test .

      - name: Verify app entry imports (production-like sys.path in container)
        run: |
          docker run --rm ppe-ci:test python -c "
          import importlib.util
          import sys
          from pathlib import Path

          root = Path('/app')
          viz = root / 'src' / 'viz'
          app = viz / 'app.py'

          sys.path = [str(viz)] + [
              p for p in sys.path
              if p and Path(p).resolve() != root.resolve()
          ]

          spec = importlib.util.spec_from_file_location('ppe_docker_entry', app)
          if spec is None or spec.loader is None:
              raise RuntimeError('cannot load app entry spec')

          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)

          if Path(mod.ROOT).resolve() != root.resolve():
              raise AssertionError(f'ROOT={mod.ROOT!r} != {root!r}')
          "

      - name: Streamlit entry starts without import error
        run: |
          set -euo pipefail
          cid="$(docker run -d --rm -p 8501:8501 ppe-ci:test \
            streamlit run src/viz/app.py \
              --server.headless true \
              --server.port 8501 \
              --server.address 0.0.0.0)"
          cleanup() { docker stop "$cid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if docker logs "$cid" 2>&1 | grep -q ModuleNotFoundError; then
              echo "ModuleNotFoundError during Streamlit startup:"
              docker logs "$cid"
              exit 1
            fi
            if curl -fsS --max-time 2 "http://127.0.0.1:8501/_stcore/health" >/dev/null; then
              echo "Streamlit healthy after ${attempt} attempt(s)"
              exit 0
            fi
            sleep 2
          done

          echo "Streamlit did not become healthy within 60s:"
          docker logs "$cid" | tail -80
          exit 1

  ui_smoke:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'viz-change')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Implied lab UI smoke (scenario A)
        run: python scripts/run_implied_lab_ui_smoke.py
        env:
          PYTHONUNBUFFERED: "1"
