# Deploy production stack on the VPS (see docs/DEPLOY/GITHUB_ACTIONS_VPS_DEPLOY.md).
name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            cd /opt/marketstructureos
            git pull
            docker compose up -d --build
