# Deploy production stack on the VPS (see docs/DEPLOY/GITHUB_ACTIONS_VPS_DEPLOY.md).
name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      research_offer_email:
        description: "Contact email for research CTA (optional; falls back to PPE_RESEARCH_OFFER_EMAIL secret)"
        required: false
        type: string

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PPE_RESEARCH_OFFER_URL: ${{ secrets.PPE_RESEARCH_OFFER_URL }}
      PPE_RESEARCH_OFFER_EMAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.research_offer_email || secrets.PPE_RESEARCH_OFFER_EMAIL }}
      PPE_RESEARCH_OFFER_LABEL: ${{ secrets.PPE_RESEARCH_OFFER_LABEL }}
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          PPE_RESEARCH_OFFER_URL: ${{ secrets.PPE_RESEARCH_OFFER_URL }}
          PPE_RESEARCH_OFFER_EMAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.research_offer_email || secrets.PPE_RESEARCH_OFFER_EMAIL }}
          PPE_RESEARCH_OFFER_LABEL: ${{ secrets.PPE_RESEARCH_OFFER_LABEL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          envs: PPE_RESEARCH_OFFER_URL,PPE_RESEARCH_OFFER_EMAIL,PPE_RESEARCH_OFFER_LABEL
          script: |
            cd /opt/marketstructureos
            git pull
            bash scripts/vps_sync_production_env.sh
            RESEARCH_URL="$(grep '^PPE_RESEARCH_OFFER_URL=' .env | head -1 | cut -d= -f2- | tr -d '\"')"
            RESEARCH_LABEL="$(grep '^PPE_RESEARCH_OFFER_LABEL=' .env | head -1 | cut -d= -f2- | tr -d '\"')"
            docker compose build app_demo app_full
            docker compose build --no-cache msos_web \
              --build-arg "NEXT_PUBLIC_PPE_RESEARCH_OFFER_URL=${RESEARCH_URL}" \
              --build-arg "NEXT_PUBLIC_PPE_RESEARCH_OFFER_LABEL=${RESEARCH_LABEL:-Request research beta access}"
            docker compose up -d --force-recreate

      - name: Demo site health (no import traceback)
        if: success()
        run: |
          set -euo pipefail
          code="000"
          for attempt in 1 2 3 4 5 6; do
            code=$(curl -sS -o /tmp/msos_body.html -w "%{http_code}" --max-time 60 https://marketstructureos.com/ || true)
            if [ "$code" = "200" ]; then
              break
            fi
            echo "Attempt $attempt/6: HTTP $code (waiting 30s for stack to settle)"
            sleep 30
          done
          if [ "$code" != "200" ]; then
            echo "Demo site health check failed (HTTP $code)"
            head -n 50 /tmp/msos_body.html || true
            exit 1
          fi
          body=$(cat /tmp/msos_body.html)
          if echo "$body" | grep -q 'ModuleNotFoundError'; then
            echo 'Demo site HTML contains ModuleNotFoundError'
            exit 1
          fi
          if echo "$body" | grep -q 'Traceback (most recent call last)'; then
            echo 'Demo site HTML contains a Python traceback'
            exit 1
          fi
          echo 'Demo site health check passed (no import traceback in HTML)'

      - name: Session notebook health
        if: success()
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/session_body.html -w "%{http_code}" --max-time 60 https://marketstructureos.com/session.html || true)
          if [ "$code" != "200" ]; then
            echo "session.html health check failed (HTTP $code)"
            exit 1
          fi
          body=$(cat /tmp/session_body.html)
          if ! echo "$body" | grep -q 'Operator session notebook'; then
            echo 'session.html missing expected operator notebook title'
            head -n 30 /tmp/session_body.html || true
            exit 1
          fi
          echo 'session.html health check passed'
