# Deploy production stack on the VPS (see docs/DEPLOY/GITHUB_ACTIONS_VPS_DEPLOY.md).
#
# Job 1 (vps-deploy) is the production ship gate — must pass for a green workflow.
# Job 2 (production-witness) runs integration witnesses; failures are reported but do
# not fail the deploy (continue-on-error) so production is not left stale when a
# witness flakes after SSH rebuild succeeded.
name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      research_offer_email:
        description: "Contact email for research CTA (optional; falls back to PPE_RESEARCH_OFFER_EMAIL secret)"
        required: false
        type: string

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  vps-deploy:
    name: VPS deploy
    runs-on: ubuntu-latest
    env:
      PPE_RESEARCH_OFFER_URL: ${{ secrets.PPE_RESEARCH_OFFER_URL }}
      PPE_RESEARCH_OFFER_EMAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.research_offer_email || secrets.PPE_RESEARCH_OFFER_EMAIL }}
      PPE_RESEARCH_OFFER_LABEL: ${{ secrets.PPE_RESEARCH_OFFER_LABEL }}
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.5
        env:
          PPE_RESEARCH_OFFER_URL: ${{ secrets.PPE_RESEARCH_OFFER_URL }}
          PPE_RESEARCH_OFFER_EMAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.research_offer_email || secrets.PPE_RESEARCH_OFFER_EMAIL }}
          PPE_RESEARCH_OFFER_LABEL: ${{ secrets.PPE_RESEARCH_OFFER_LABEL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          envs: PPE_RESEARCH_OFFER_URL,PPE_RESEARCH_OFFER_EMAIL,PPE_RESEARCH_OFFER_LABEL
          script: |
            set -euo pipefail
            cd /opt/marketstructureos
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            echo "Deployed commit: $(git rev-parse HEAD)"
            bash scripts/vps_sync_production_env.sh
            RESEARCH_URL="$(grep '^PPE_RESEARCH_OFFER_URL=' .env | head -1 | cut -d= -f2- | tr -d '\"')"
            RESEARCH_LABEL="$(grep '^PPE_RESEARCH_OFFER_LABEL=' .env | head -1 | cut -d= -f2- | tr -d '\"')"
            docker compose build app_demo app_full ppe_display_api
            docker compose build --no-cache msos_web \
              --build-arg "NEXT_PUBLIC_PPE_RESEARCH_OFFER_URL=${RESEARCH_URL}" \
              --build-arg "NEXT_PUBLIC_PPE_RESEARCH_OFFER_LABEL=${RESEARCH_LABEL:-Request research beta access}"
            docker compose up -d --force-recreate msos_web
            docker compose up -d --force-recreate

      - name: Demo site health (no import traceback)
        run: |
          set -euo pipefail
          code="000"
          for attempt in 1 2 3 4 5 6; do
            code=$(curl -sS -o /tmp/msos_body.html -w "%{http_code}" --max-time 60 https://marketstructureos.com/ || true)
            if [ "$code" = "200" ]; then
              break
            fi
            echo "Attempt $attempt/6: HTTP $code (waiting 30s for stack to settle)"
            sleep 30
          done
          if [ "$code" != "200" ]; then
            echo "Demo site health check failed (HTTP $code)"
            head -n 50 /tmp/msos_body.html || true
            exit 1
          fi
          body=$(cat /tmp/msos_body.html)
          if echo "$body" | grep -q 'ModuleNotFoundError'; then
            echo 'Demo site HTML contains ModuleNotFoundError'
            exit 1
          fi
          if echo "$body" | grep -q 'Traceback (most recent call last)'; then
            echo 'Demo site HTML contains a Python traceback'
            exit 1
          fi
          echo 'Demo site health check passed (no import traceback in HTML)'

      - name: Session notebook health
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/session_body.html -w "%{http_code}" --max-time 60 https://marketstructureos.com/session.html || true)
          if [ "$code" != "200" ]; then
            echo "session.html health check failed (HTTP $code)"
            exit 1
          fi
          body=$(cat /tmp/session_body.html)
          if ! echo "$body" | grep -q 'Operator session notebook'; then
            echo 'session.html missing expected operator notebook title'
            head -n 30 /tmp/session_body.html || true
            exit 1
          fi
          echo 'session.html health check passed'

      - name: Checkout (MSOS ship verify)
        uses: actions/checkout@v7

      - name: Verify MSOS web client bundle shipped
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            if python scripts/verify_msos_web_ship.py; then
              echo "msos_web ship verify passed"
              exit 0
            fi
            echo "Attempt $attempt/6: msos_web bundle not fresh yet (waiting 30s)"
            sleep 30
          done
          echo "msos_web ship verify failed — stale client bundle still served"
          exit 1

  production-witness:
    name: Production witness
    needs: vps-deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout (production witnesses)
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Production PPE integration witness
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
          python scripts/msos_production_demo_witness.py --write artifacts/health/msos_production_demo_witness.json
          PYTHONPATH=. python scripts/msos_production_playwright_witness.py --write-dir artifacts/health/msos_production_playwright
          PYTHONPATH=. python scripts/msos_journey_crawler.py \
            --base-url https://marketstructureos.com \
            --flows routes missing-paper delete-paper \
            --write-dir artifacts/health/msos_journey_crawler

      - name: Upload production witness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: msos-production-witness
          path: artifacts/health/
          if-no-files-found: error
