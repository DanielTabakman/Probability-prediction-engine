# Advisory supply-chain checks (does not block merge-on-green; surfaces CVEs early).
name: Dependency audit

on:
  pull_request:
    paths:
      - requirements.txt
      - apps/msos-web/package.json
      - apps/msos-web/package-lock.json
      - .github/workflows/dependency-audit.yml
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: pip-audit (Python)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/msos-web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/msos-web/package-lock.json

      - name: npm audit (MSOS web)
        run: |
          npm ci
          npm audit --audit-level=high
