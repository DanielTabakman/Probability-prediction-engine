# Applies `automerge` only when a PR explicitly opts in with a body marker.
# Normal chapter and agent PRs remain reviewable and never receive this label automatically.
name: Label PR automerge

on:
  pull_request:
    types: [opened, reopened, edited, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  add-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const marker = '<!-- ppe-automerge: true -->';

            if (pr.draft) {
              core.info('Draft PR; skip automerge label');
              return;
            }
            const headFull = pr.head.repo.full_name;
            if (headFull !== `${owner}/${repo}`) {
              core.info(`Fork or foreign head (${headFull}); skip automerge label`);
              return;
            }
            if (!(pr.body || '').includes(marker)) {
              core.info(`PR #${pr.number} has no explicit ${marker} marker; skip automerge label`);
              return;
            }

            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'automerge' });
            } catch (e) {
              if (e.status !== 404) throw e;
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: 'automerge',
                color: '0E8A16',
                description: 'Explicit opt-in: squash-merge only after green CI',
              });
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: ['automerge'],
            });
            core.notice(`Added explicit automerge label to PR #${pr.number}`);
