name: Google Docs sync

on:
  workflow_dispatch:
    inputs:
      sync_master_to_repo:
        description: "Sync PPE Master Google Doc into repo docs/VISION/PPE_MASTER_MVP1.md"
        required: true
        default: "true"
      sync_repo_to_mirror:
        description: "Sync repo MSOS snapshot into MSOS mirror Google Doc marker block"
        required: true
        default: "true"
  schedule:
    # Daily 13:15 UTC (adjust as needed).
    - cron: "15 13 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Sync Google Docs
        env:
          PPE_MASTER_DOC_ID: ${{ secrets.PPE_MASTER_DOC_ID }}
          PPE_MSOS_MIRROR_DOC_ID: ${{ secrets.PPE_MSOS_MIRROR_DOC_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          python scripts/sync_msos_repo_truth.py
          python scripts/google_docs_sync.py \
            $([ "${{ inputs.sync_master_to_repo }}" = "true" ] && echo "--sync-master-to-repo") \
            $([ "${{ inputs.sync_repo_to_mirror }}" = "true" ] && echo "--sync-repo-to-mirror") \
            --write-report

      - name: Verify mirror regenerated timestamp
        env:
          PPE_MSOS_MIRROR_DOC_ID: ${{ secrets.PPE_MSOS_MIRROR_DOC_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          python scripts/verify_msos_mirror_timestamp.py

      - name: Commit updated repo docs (if any)
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Control-plane: sync Google Docs"
            git push
          else
            echo "No changes to commit."
          fi

