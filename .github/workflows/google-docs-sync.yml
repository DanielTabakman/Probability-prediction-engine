name: Google Docs manual sync (legacy fallback)

# GitHub is the canonical control plane. This workflow is retained only for
# deliberate archival/export fallback and must not run on a schedule.
on:
  workflow_dispatch:
    inputs:
      sync_master_to_repo:
        description: "Legacy fallback: import PPE Master Google Doc into repo"
        required: true
        default: "false"
      sync_repo_to_mirror:
        description: "Legacy fallback: export repo MSOS snapshot to Google Doc mirror"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Sync Google Docs manually
        env:
          PPE_MASTER_DOC_ID: ${{ secrets.PPE_MASTER_DOC_ID }}
          PPE_MSOS_MIRROR_DOC_ID: ${{ secrets.PPE_MSOS_MIRROR_DOC_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          ARGS="--write-report"
          if [ "${{ inputs.sync_master_to_repo }}" = "true" ]; then
            ARGS="$ARGS --sync-master-to-repo"
          fi
          if [ "${{ inputs.sync_repo_to_mirror }}" = "true" ]; then
            python scripts/sync_msos_repo_truth.py
            ARGS="$ARGS --sync-repo-to-mirror"
          fi
          if [ "$ARGS" = "--write-report" ]; then
            echo "No sync direction selected; exiting without changes."
            exit 0
          fi
          python scripts/google_docs_sync.py $ARGS

      - name: Commit updated repo docs (if any)
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Control-plane: manual legacy Google Docs sync"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Verify Live Mirror timestamp when exported
        if: ${{ inputs.sync_repo_to_mirror == 'true' }}
        env:
          PPE_MSOS_MIRROR_DOC_ID: ${{ secrets.PPE_MSOS_MIRROR_DOC_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          PYTHONPATH: .
        run: python scripts/verify_msos_mirror_timestamp.py --max-age-hours 24
