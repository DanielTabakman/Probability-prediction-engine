# Site probe — was every 5 minutes (minute hog); now every 30 minutes. See docs/DEPLOY/GITHUB_ACTIONS_VPS_DEPLOY.md.
name: Uptime healthcheck

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Demo homepage must return 200
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/body.html -w "%{http_code}" --max-time 60 https://marketstructureos.com/ || true)
          if [ "$code" != "200" ]; then
            echo "Healthcheck failed: HTTP $code"
            head -n 80 /tmp/body.html || true
            exit 1
          fi

      - name: Checkout (uptime verify)
        uses: actions/checkout@v7

      - name: Apex must be Next.js MSOS (not Streamlit)
        run: |
          set -euo pipefail
          python scripts/verify_msos_web_ship.py --apex-only
