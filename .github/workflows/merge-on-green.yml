# Explicit opt-in merge: runs only after the CI workflow itself completes successfully.
# A successful labeling workflow can never trigger a merge.
name: Merge on green

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  merge-labeled:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const run = context.payload.workflow_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.payload.repository.default_branch || 'main';

            if (run.name !== 'CI' || run.conclusion !== 'success' || run.event !== 'pull_request') {
              core.info(`Skip non-green CI run: name=${run.name} conclusion=${run.conclusion} event=${run.event}`);
              return;
            }

            let prRefs = run.pull_requests || [];
            if (!prRefs.length && run.head_branch && run.head_branch !== defaultBranch) {
              const { data: items } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:${run.head_branch}`,
                base: defaultBranch,
              });
              prRefs = items.map((p) => ({ number: p.number }));
            }

            for (const { number } of prRefs) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: number,
              });
              if (pr.draft || pr.merged || pr.state !== 'open') continue;
              if (pr.head.sha !== run.head_sha) {
                core.warning(`PR #${number} moved from CI SHA ${run.head_sha.slice(0, 7)} to ${pr.head.sha.slice(0, 7)}; skip`);
                continue;
              }
              if (!pr.labels.some((label) => label.name === 'automerge')) {
                core.info(`PR #${number} has no explicit automerge label; skip`);
                continue;
              }
              if (pr.mergeable === false) {
                core.warning(`PR #${number} has conflicts; skip`);
                continue;
              }

              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: 'ci.yml',
                head_sha: pr.head.sha,
                event: 'pull_request',
                per_page: 20,
              });
              const exactRun = (runs.workflow_runs || []).find((item) => item.id === run.id);
              if (!exactRun || exactRun.conclusion !== 'success') {
                core.warning(`Exact CI run ${run.id} is not confirmed successful; skip PR #${number}`);
                continue;
              }

              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: number,
                merge_method: 'squash',
              });
              core.notice(`Merged explicitly opted-in PR #${number} after exact green CI run ${run.id}`);

              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner,
                  repo,
                  workflow_id: 'deploy-vps.yml',
                  ref: defaultBranch,
                });
              } catch (dispatchErr) {
                core.warning(`Deploy dispatch failed: ${dispatchErr.message}`);
              }
            }
