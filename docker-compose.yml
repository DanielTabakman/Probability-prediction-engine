services:
  msos_web:
    build:
      context: ./apps/msos-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MSOS_SIGN_IN_URL: ${NEXT_PUBLIC_MSOS_SIGN_IN_URL:-https://app.marketstructureos.com}
        NEXT_PUBLIC_PPE_RESEARCH_OFFER_URL: ${PPE_RESEARCH_OFFER_URL:-}
        NEXT_PUBLIC_PPE_RESEARCH_OFFER_LABEL: ${PPE_RESEARCH_OFFER_LABEL:-}
        NEXT_PUBLIC_PPE_EMBED_URL: ${NEXT_PUBLIC_PPE_EMBED_URL:-/ppe-embed}
        NEXT_PUBLIC_PPE_DISPLAY_API_URL: ${NEXT_PUBLIC_PPE_DISPLAY_API_URL:-/ppe-display-api/display.json}
    container_name: msos_web
    environment:
      - PORT=3000
      - PPE_DISPLAY_API_SERVER_URL=http://ppe_display_api:8765/display.json
      - PPE_WEB_FEEDBACK_DIR=/data
      - PPE_SNAPSHOT_DB_PATH=/ppe-snapshots/ppe_frozen_evaluations.sqlite3
      - PPE_RESEARCH_OFFER_URL=${PPE_RESEARCH_OFFER_URL:-}
      - PPE_RESEARCH_OFFER_LABEL=${PPE_RESEARCH_OFFER_LABEL:-}
    volumes:
      - msos_web_data:/data
      - ppe_snapshots:/ppe-snapshots:ro
    restart: unless-stopped
    networks:
      - web

  app_demo:
    build: .
    container_name: ppe_app_demo
    environment:
      - PORT=8501
      - PPE_ENABLE_SNAPSHOTS=0
      - PPE_PRIVATE_APP_URL=https://app.marketstructureos.com
      - PPE_RESEARCH_OFFER_URL=${PPE_RESEARCH_OFFER_URL:-}
      - PPE_RESEARCH_OFFER_LABEL=${PPE_RESEARCH_OFFER_LABEL:-}
    restart: unless-stopped
    networks:
      - web

  ppe_display_api:
    build: .
    container_name: ppe_display_api
    command: ["python", "-m", "src.viz.display_payload_server"]
    environment:
      - PORT=8765
    restart: unless-stopped
    networks:
      - web

  app_full:
    build: .
    container_name: ppe_app_full
    environment:
      - PORT=8501
      - PPE_ENABLE_SNAPSHOTS=1
      - PPE_SNAPSHOT_DB_PATH=/data/ppe_frozen_evaluations.sqlite3
    volumes:
      - ppe_snapshots:/data
    restart: unless-stopped
    networks:
      - web

  caddy:
    image: caddy:2
    container_name: ppe_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${PPE_CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - ./caddy:/etc/caddy/caddy:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - web

volumes:
  ppe_snapshots:
    name: ppe_snapshots
  msos_web_data:
    name: msos_web_data
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
